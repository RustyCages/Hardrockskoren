<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Hårdrockskören – Övningsportal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root {
  --red: #e62e2e;
  --red-dark: #b01f1f;
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --muted: #888;
  --radius: 10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  padding: 0 0 100px;
  min-height: 100vh;
}

/* HEADER */
.app-header {
  background: #111;
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: sticky;
  top: 0;
  z-index: 200;
}
.app-header img {
  height: 52px;
  width: auto;
}

/* MAIN CONTENT */
.content { padding: 16px; }

/* IOS INIT BUTTON */
#ios-init {
  background: var(--red);
  color: #fff;
  width: 100%;
  padding: 16px;
  border-radius: var(--radius);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border: none;
  margin-bottom: 16px;
  display: block;
  cursor: pointer;
}

/* HELP */
.help-btn-toggle {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  width: 100%;
  padding: 10px;
  border-radius: var(--radius);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  margin-bottom: 12px;
  cursor: pointer;
}
#help-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
  display: none;
  font-size: 14px;
  line-height: 1.6;
  color: #ccc;
}
#help-section h3 { color: var(--red); margin-bottom: 8px; font-size: 15px; }

/* STICKY PLAYER */
.player-sticky {
  position: sticky;
  top: 77px;
  z-index: 100;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7);
}
.now-playing {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--red);
  text-align: center;
  margin-bottom: 10px;
  height: 1.3em;
  overflow: hidden;
  text-transform: uppercase;
}

audio {
  width: 100%;
  height: 40px;
  margin-bottom: 10px;
  background: #222;
  border-radius: 8px;
}
audio::-webkit-media-controls-panel { background-color: #222; }
audio::-webkit-media-controls-play-button { filter: invert(1); }
audio::-webkit-media-controls-mute-button { filter: invert(1); }
audio::-webkit-media-controls-timeline { filter: invert(1) brightness(2); }
audio::-webkit-media-controls-current-time-display { color: #fff; }
audio::-webkit-media-controls-time-remaining-display { color: #fff; }

.nav-controls { display: flex; gap: 8px; }
.nav-btn {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: var(--radius);
  flex: 1;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 1px;
  cursor: pointer;
}
.nav-btn.primary {
  background: var(--red);
  border-color: var(--red);
  flex: 2;
}

/* SEARCH */
#searchBar {
  width: 100%;
  padding: 13px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  margin-bottom: 16px;
}
#searchBar::placeholder { color: var(--muted); }

/* SONG CARDS */
.song-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.song-card.has-selection { border-color: var(--red); }

.song-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
  cursor: pointer;
}
.song-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text);
  text-transform: uppercase;
}
.song-artist {
  font-size: 13px;
  color: var(--muted);
  margin-top: 2px;
}
.song-chevron {
  color: var(--muted);
  font-size: 18px;
  transition: transform 0.2s;
}
.song-card.expanded .song-chevron { transform: rotate(90deg); }

.selection-badge {
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 2px 7px;
  border-radius: 20px;
  margin-left: 8px;
  display: none;
  vertical-align: middle;
}
.has-selection .selection-badge { display: inline-block; }

.song-content {
  display: none;
  border-top: 1px solid var(--border);
}
.song-card.expanded .song-content { display: block; }

.track-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  border-bottom: 1px solid #1a1a1a;
}
.track-row:last-child { border-bottom: none; }

.track-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  width: 72px;
  flex-shrink: 0;
  color: #ccc;
  text-transform: uppercase;
}
.play-btn {
  flex-grow: 1;
  padding: 11px;
  border: none;
  border-radius: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #fff;
  text-transform: uppercase;
  cursor: pointer;
}

/* Stämmor */
.c-bass     { background: #1d3f8a; }
.c-tenor    { background: #1a6b35; }
.c-alto     { background: #8a4d00; }
.c-soprano  { background: #8b0d4a; }
.c-choir    { background: var(--red); }
.c-backing  { background: #3a3a3a; }

input[type="checkbox"] {
  width: 26px;
  height: 26px;
  accent-color: var(--red);
  flex-shrink: 0;
}

/* FOOTER */
footer {
  text-align: center;
  margin-top: 40px;
  padding: 20px 16px;
  border-top: 1px solid var(--border);
  color: #444;
  font-size: 11px;
  line-height: 1.8;
}
</style>
</head>

const audioPlayer = document.getElementById('audioPlayer');
const trackTitle = document.getElementById('trackTitle');

let playQueue = [];
let currentIndex = 0;

function initAudio() {
    audioPlayer.src = "https://actions.google.com/sounds/v1/alarms/beep_short.ogg";
    audioPlayer.play().then(() => {
        audioPlayer.pause();
        document.getElementById('ios-init').style.display = 'none';
        trackTitle.innerText = "Ljud redo!";
    }).catch(e => console.log("Init misslyckades:", e));
}

// Fetch via blob för att kringgå webbläsarens URL-normalisering (NFD → NFC)
async function fetchAudioBlob(url) {
    const response = await fetch(url);
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const blob = await response.blob();
    return URL.createObjectURL(blob);
}
let currentBlobUrl = null;

async function playTrack(idx) {
    if (idx < 0 || idx >= playQueue.length) return;
    currentIndex = idx;
    const t = playQueue[currentIndex];
    try {
        if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
        trackTitle.innerText = '⏳ ' + t.name;
        currentBlobUrl = await fetchAudioBlob(t.url);
        trackTitle.innerText = '[' + (currentIndex + 1) + '/' + playQueue.length + '] ' + t.name;
        audioPlayer.src = currentBlobUrl;
        audioPlayer.load();
        const p = audioPlayer.play();
        if (p !== undefined) p.catch(() => { trackTitle.innerText = 'Tryck PLAY manuellt'; });
    } catch(err) {
        trackTitle.innerText = '❌ ' + t.name;
        console.error(err);
    }
}

audioPlayer.addEventListener('ended', function() {
    if (currentIndex < playQueue.length - 1) {
        nextTrack();
    } else {
        trackTitle.innerText = "Spellistan klar!";
    }
});

function nextTrack() { if (currentIndex < playQueue.length - 1) playTrack(currentIndex + 1); }
function prevTrack() { if (currentIndex > 0) playTrack(currentIndex - 1); }

function startPlaylist() {
    playQueue = [];
    songs.forEach(s => {
        s.tracks.forEach((t, i) => {
            const cb = document.getElementById(`cb-${s.id}-${i}`);
            if (cb && cb.checked) {
                playQueue.push({ url: t.url, name: `${s.title} (${t.label})` });
            }
        });
    });
    if (playQueue.length > 0) playTrack(0);
    else alert("Välj minst en stämma först!");
}

// FIXAD FUNKTION: Hittar nu rätt låt via ID istället för index
function playSingle(e, songId, trackIdx) {
    e.stopPropagation();
    const song = songs.find(s => s.id === songId);
    if (!song) return;
    const track = song.tracks[trackIdx];
    playQueue = [{ url: track.url, name: `${song.title} (${track.label})` }];
    playTrack(0);
}

function toggleHelp() {
    const hs = document.getElementById('help-section');
    hs.style.display = hs.style.display === 'block' ? 'none' : 'block';
}

function toggleSong(cardId) {
    const card = document.getElementById(cardId);
    if (card) card.classList.toggle('expanded');
}

function updateBadge(songId) {
    const card = document.getElementById(`card-${songId}`);
    const checked = card.querySelectorAll('input[type="checkbox"]:checked').length;
    if (checked > 0) {
        card.classList.add('has-selection');
        card.querySelector('.selection-badge').innerText = `${checked} VALDA`;
    } else {
        card.classList.remove('has-selection');
    }
}

songs.sort((a, b) => a.title.localeCompare(b.title));

function render() {
    const term = document.getElementById('searchBar').value.toLowerCase();
    let html = "";
    songs.forEach((s) => {
        if(!s.title.toLowerCase().includes(term) && !s.artist.toLowerCase().includes(term)) return;
        html += `
        <div class="song-card" id="card-${s.id}">
            <div class="song-header" onclick="toggleSong('card-${s.id}')">
                <div>
                    <div class="song-title">${s.title} <span class="selection-badge"></span></div>
                    <div class="song-artist">${s.artist}</div>
                </div>
            </div>
            <div class="song-content">`;
        s.tracks.forEach((t, tIdx) => {
            html += `
                <div class="track-row">
                    <input type="checkbox" id="cb-${s.id}-${tIdx}" onchange="updateBadge('${s.id}')">
                    <span class="track-label">${t.label}</span>
                    <button class="play-btn ${t.cls}" onclick="playSingle(event, '${s.id}', ${tIdx})">LYSSNA</button>
                </div>`;
        });
        html += `</div></div>`;
    });
    document.getElementById('songList').innerHTML = html;
}
render();
